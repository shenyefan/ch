<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zigzag Bridge & Water Houses — Chinese Building on Water</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #f5f0e8;
      color: #2a1f0e;
      padding: 24px 16px;
    }

    .widget {
      max-width: 820px;
      margin: 0 auto;
    }

    h1 {
      font-size: 25px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
      color: #2a1f0e;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #7a6a52;
      margin-bottom: 24px;
      font-family: system-ui, sans-serif;
      line-height: 1.5;
    }

    .stage-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20px;
    }

    .stage-btn {
      border: 1px solid #c8b89a;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all .2s;
      background: #ede8de;
      color: #7a6a52;
      font-family: system-ui, sans-serif;
    }

    .stage-btn.active {
      background: #1a4a5a;
      color: #fff;
      border-color: #1a4a5a;
    }

    .stage-btn:hover:not(.active) {
      background: #e0d8ca;
    }

    .diagram-wrap {
      background: #e8f0f5;
      border-radius: 12px;
      border: 1px solid #a8c4d0;
      padding: 16px;
      margin-bottom: 16px;
    }

    svg {
      width: 100%;
      display: block;
    }

    .detail-card {
      border-radius: 12px;
      padding: 16px 20px;
      background: #ede8de;
      border: 1px solid #c8b89a;
    }

    .stage-title {
      font-size: 15px;
      font-weight: 700;
      color: #2a1f0e;
      margin-bottom: 12px;
      font-family: Georgia, serif;
    }

    .stage-title .zh {
      font-size: 12px;
      color: #1a4a5a;
      font-weight: 400;
      margin-left: 6px;
      font-family: system-ui, sans-serif;
    }

    .layer-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid #c8b89a;
    }

    .layer-row:last-child {
      border-bottom: none;
    }

    .layer-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 3px;
    }

    .layer-name {
      font-size: 14px;
      font-weight: 600;
      color: #2a1f0e;
      min-width: 195px;
      flex-shrink: 0;
      font-family: system-ui, sans-serif;
    }

    .layer-name .zh {
      font-size: 12px;
      color: #1a4a5a;
      font-weight: 400;
      margin-left: 4px;
    }

    .layer-desc {
      font-size: 13px;
      color: #5a4a32;
      line-height: 1.55;
      font-family: system-ui, sans-serif;
    }

    @media (max-width: 560px) {
      .layer-row {
        flex-direction: column;
        gap: 4px;
      }

      .layer-name {
        min-width: unset;
      }
    }
  </style>
</head>
<body>
<div class="widget">
  <h1>Zigzag Bridge & Water Houses — 九曲桥与水上民居</h1>
  <p class="subtitle">
    Click each stage to explore how Chinese builders created bridges and houses above water
  </p>

  <div class="stage-btns">
    <button class="stage-btn active" onclick="show(0)">① Water & Site</button>
    <button class="stage-btn" onclick="show(1)">② Timber Piles</button>
    <button class="stage-btn" onclick="show(2)">③ Platforms</button>
    <button class="stage-btn" onclick="show(3)">④ Water Houses</button>
    <button class="stage-btn" onclick="show(4)">⑤ Zigzag Bridge</button>
    <button class="stage-btn" onclick="show(5)">⑥ Full Water Town Scene</button>
  </div>

  <div class="diagram-wrap">
    <svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="#1a4a5a" stroke-width="1.5" stroke-linecap="round"/>
        </marker>
      </defs>

      <!-- background -->
      <rect x="0" y="0" width="760" height="420" fill="#e8f0f5"/>

      <!-- land -->
      <rect x="20" y="285" width="150" height="95" fill="#8b7355" opacity="0.85"/>
      <rect x="590" y="285" width="150" height="95" fill="#8b7355" opacity="0.85"/>
      <text x="58" y="333" font-size="12" fill="#f8f4ed" font-family="system-ui,sans-serif" font-weight="700">岸边 Bank</text>
      <text x="635" y="333" font-size="12" fill="#f8f4ed" font-family="system-ui,sans-serif" font-weight="700">岸边 Bank</text>

      <!-- water -->
      <rect x="120" y="175" width="520" height="150" fill="#6aaec4" opacity="0.42"/>
      <path d="M130 195 Q170 188 210 195 Q250 202 290 195 Q330 188 370 195 Q410 202 450 195 Q490 188 530 195 Q570 202 610 195"
            fill="none" stroke="#4a8ea4" stroke-width="1.1" opacity="0.6"/>
      <path d="M140 225 Q180 218 220 225 Q260 232 300 225 Q340 218 380 225 Q420 232 460 225 Q500 218 540 225 Q580 232 620 225"
            fill="none" stroke="#4a8ea4" stroke-width="1.1" opacity="0.5"/>
      <path d="M150 255 Q190 248 230 255 Q270 262 310 255 Q350 248 390 255 Q430 262 470 255 Q510 248 550 255 Q590 262 630 255"
            fill="none" stroke="#4a8ea4" stroke-width="1.1" opacity="0.45"/>

      <text x="380" y="245" text-anchor="middle" font-size="13" fill="#1a4a5a" font-family="system-ui,sans-serif" font-weight="700">
        水道 Waterway
      </text>

      <!-- stage 2: piles -->
      <g id="g-piles" opacity="0" style="transition: opacity .45s;">
        <!-- left house piles -->
        <rect x="190" y="210" width="10" height="105" fill="#6b4423"/>
        <rect x="220" y="215" width="10" height="100" fill="#6b4423"/>
        <rect x="250" y="210" width="10" height="105" fill="#6b4423"/>
        <rect x="280" y="215" width="10" height="100" fill="#6b4423"/>

        <!-- right house piles -->
        <rect x="455" y="210" width="10" height="105" fill="#6b4423"/>
        <rect x="485" y="215" width="10" height="100" fill="#6b4423"/>
        <rect x="515" y="210" width="10" height="105" fill="#6b4423"/>
        <rect x="545" y="215" width="10" height="100" fill="#6b4423"/>

        <text x="238" y="198" text-anchor="middle" font-size="11" fill="#6b4423" font-family="system-ui,sans-serif" font-weight="700">
          木桩 Timber piles
        </text>
        <text x="503" y="198" text-anchor="middle" font-size="11" fill="#6b4423" font-family="system-ui,sans-serif" font-weight="700">
          木桩 Timber piles
        </text>
      </g>

      <!-- stage 3: platforms -->
      <g id="g-platforms" opacity="0" style="transition: opacity .45s;">
        <rect x="175" y="195" width="130" height="16" rx="2" fill="#9a6b3d"/>
        <rect x="440" y="195" width="130" height="16" rx="2" fill="#9a6b3d"/>

        <line x1="175" y1="203" x2="305" y2="203" stroke="#70451f" stroke-width="1" opacity="0.5"/>
        <line x1="440" y1="203" x2="570" y2="203" stroke="#70451f" stroke-width="1" opacity="0.5"/>

        <text x="240" y="186" text-anchor="middle" font-size="11" fill="#7a4e24" font-family="system-ui,sans-serif" font-weight="700">
          平台 Platform
        </text>
        <text x="505" y="186" text-anchor="middle" font-size="11" fill="#7a4e24" font-family="system-ui,sans-serif" font-weight="700">
          平台 Platform
        </text>
      </g>

      <!-- stage 4: houses -->
      <g id="g-houses" opacity="0" style="transition: opacity .45s;">
        <!-- left house -->
        <rect x="190" y="140" width="100" height="55" fill="#f1e5c8" stroke="#bda77d" stroke-width="1"/>
        <polygon points="180,140 240,108 300,140" fill="#4e3a2d"/>
        <rect x="205" y="157" width="18" height="20" fill="#8b5a2b"/>
        <rect x="236" y="153" width="22" height="16" fill="#8fb2c5"/>
        <rect x="265" y="153" width="14" height="24" fill="#8b5a2b"/>

        <!-- right house -->
        <rect x="455" y="140" width="100" height="55" fill="#f1e5c8" stroke="#bda77d" stroke-width="1"/>
        <polygon points="445,140 505,108 565,140" fill="#4e3a2d"/>
        <rect x="470" y="157" width="18" height="20" fill="#8b5a2b"/>
        <rect x="501" y="153" width="22" height="16" fill="#8fb2c5"/>
        <rect x="530" y="153" width="14" height="24" fill="#8b5a2b"/>

        <text x="240" y="101" text-anchor="middle" font-size="11" fill="#4e3a2d" font-family="system-ui,sans-serif" font-weight="700">
          水上民居 Water house
        </text>
        <text x="505" y="101" text-anchor="middle" font-size="11" fill="#4e3a2d" font-family="system-ui,sans-serif" font-weight="700">
          水上民居 Water house
        </text>
      </g>

      <!-- stage 5: zigzag bridge -->
      <g id="g-bridge" opacity="0" style="transition: opacity .45s;">
        <!-- bridge deck zigzag -->
        <rect x="295" y="202" width="58" height="12" rx="2" fill="#c8a878"/>
        <rect x="345" y="184" width="12" height="40" rx="2" fill="#c8a878"/>
        <rect x="345" y="184" width="72" height="12" rx="2" fill="#c8a878"/>
        <rect x="405" y="184" width="12" height="62" rx="2" fill="#c8a878"/>
        <rect x="405" y="234" width="70" height="12" rx="2" fill="#c8a878"/>

        <!-- bridge supports -->
        <rect x="307" y="214" width="8" height="44" fill="#7a5a38"/>
        <rect x="333" y="214" width="8" height="44" fill="#7a5a38"/>
        <rect x="369" y="196" width="8" height="58" fill="#7a5a38"/>
        <rect x="395" y="196" width="8" height="58" fill="#7a5a38"/>
        <rect x="430" y="246" width="8" height="34" fill="#7a5a38"/>
        <rect x="455" y="246" width="8" height="34" fill="#7a5a38"/>

        <!-- railings -->
        <line x1="295" y1="202" x2="353" y2="202" stroke="#b04128" stroke-width="3"/>
        <line x1="295" y1="214" x2="353" y2="214" stroke="#b04128" stroke-width="3"/>

        <line x1="345" y1="184" x2="417" y2="184" stroke="#b04128" stroke-width="3"/>
        <line x1="345" y1="196" x2="417" y2="196" stroke="#b04128" stroke-width="3"/>

        <line x1="405" y1="234" x2="475" y2="234" stroke="#b04128" stroke-width="3"/>
        <line x1="405" y1="246" x2="475" y2="246" stroke="#b04128" stroke-width="3"/>

        <text x="390" y="170" text-anchor="middle" font-size="12" fill="#8a6838" font-family="system-ui,sans-serif" font-weight="700">
          九曲桥 Zigzag Bridge
        </text>
      </g>

      <!-- full labels -->
      <g id="g-labels" opacity="0" style="transition: opacity .45s;">
        <line x1="638" y1="175" x2="638" y2="325" stroke="#1a4a5a" stroke-width="1" marker-end="url(#arr)"/>
        <text x="650" y="252" font-size="10" fill="#1a4a5a" font-family="system-ui,sans-serif" transform="rotate(90,650,252)">
          Water depth
        </text>

        <line x1="190" y1="320" x2="555" y2="320" stroke="#1a4a5a" stroke-width="1" stroke-dasharray="3 2"/>
        <text x="372" y="336" text-anchor="middle" font-size="10" fill="#1a4a5a" font-family="system-ui,sans-serif" font-weight="700">
          Houses and bridge raised above the water
        </text>
      </g>
    </svg>
  </div>

  <div class="detail-card">
    <div id="detail-content"></div>
  </div>
</div>

<script>
const stages = [
  {
    title: "Stage 1 — Water and Building Site",
    zh: "水域与选址 Shuǐyù yǔ Xuǎnzhǐ",
    show: [],
    hide: ["g-piles", "g-platforms", "g-houses", "g-bridge", "g-labels"],
    layers: [
      {
        color: "#6aaec4",
        name: "Water channel (水道)",
        zh: "水道",
        desc: "Builders first studied the canal, pond, or slow river branch. They chose a place where the water was calm enough for building and where people could move between houses, gardens, and paths."
      },
      {
        color: "#8b7355",
        name: "Banks and edges (岸边)",
        zh: "岸边",
        desc: "The land on both sides was important because it gave access to the water structures. In Chinese water towns, the edge of land and water was treated as part of daily life, not as a boundary."
      },
      {
        color: "#1a4a5a",
        name: "Planning movement (交通布局)",
        zh: "交通布局",
        desc: "Chinese builders planned how people would walk, cross, rest, and enjoy the scenery. The water route, house platforms, and bridge shape were arranged together as one design."
      }
    ]
  },
  {
    title: "Stage 2 — Timber Piles in the Water",
    zh: "木桩基础 Mùzhuāng Jīchǔ",
    show: ["g-piles"],
    hide: ["g-platforms", "g-houses", "g-bridge", "g-labels"],
    layers: [
      {
        color: "#6b4423",
        name: "Timber piles (木桩)",
        zh: "木桩",
        desc: "Long wooden piles were driven down through soft mud until they reached firmer ground below. These piles acted like legs, lifting houses and walkways above the water."
      },
      {
        color: "#7a5a38",
        name: "Raised support system (架空支撑)",
        zh: "架空支撑",
        desc: "Instead of fighting the water by filling everything with earth, builders raised the structure. This let water remain underneath while the buildings stayed dry above."
      },
      {
        color: "#5a3a18",
        name: "Water adaptation (因水而建)",
        zh: "因水而建",
        desc: "This method shows an important Chinese idea: build with the site, not against it. The structure adapts to the water rather than trying to remove it."
      }
    ]
  },
  {
    title: "Stage 3 — Platforms Above the Water",
    zh: "水上平台 Shuǐshàng Píngtái",
    show: ["g-piles", "g-platforms"],
    hide: ["g-houses", "g-bridge", "g-labels"],
    layers: [
      {
        color: "#9a6b3d",
        name: "Wooden platform beams (梁架平台)",
        zh: "梁架平台",
        desc: "Heavy timber beams were laid across the tops of the piles to create a stable platform. This platform spread the weight of the house and gave a flat base for construction."
      },
      {
        color: "#70451f",
        name: "Load distribution (承重分布)",
        zh: "承重分布",
        desc: "Because the weight sat on many piles instead of one point, the structure stayed balanced. This helped the house resist sinking into the wet ground."
      },
      {
        color: "#c8a878",
        name: "Daily access (生活通道)",
        zh: "生活通道",
        desc: "These platforms were not only structural. They also created small walkways, work areas, and spaces where people could step out above the water."
      }
    ]
  },
  {
    title: "Stage 4 — Houses Built on the Water",
    zh: "水上房屋 Shuǐshàng Fángwū",
    show: ["g-piles", "g-platforms", "g-houses"],
    hide: ["g-bridge", "g-labels"],
    layers: [
      {
        color: "#f1e5c8",
        name: "Light wall structure (轻墙体)",
        zh: "轻墙体",
        desc: "The houses were built with lighter wall materials above the timber base so the load stayed manageable. The raised platform carried the building while keeping the living space above damp water."
      },
      {
        color: "#4e3a2d",
        name: "Sloped roof (坡屋顶)",
        zh: "坡屋顶",
        desc: "The sloped roof quickly moved rainwater away from the walls and platform. This was important in wet southern regions where water towns were common."
      },
      {
        color: "#8b5a2b",
        name: "Living with water (临水而居)",
        zh: "临水而居",
        desc: "These houses show how Chinese settlements often used water as part of daily life. People lived beside it, above it, and moved across it with connected bridges and walkways."
      }
    ]
  },
  {
    title: "Stage 5 — The Zigzag Bridge",
    zh: "九曲桥 Jiǔqūqiáo",
    show: ["g-piles", "g-platforms", "g-houses", "g-bridge"],
    hide: ["g-labels"],
    layers: [
      {
        color: "#c8a878",
        name: "Zigzag deck (曲折桥面)",
        zh: "曲折桥面",
        desc: "The zigzag bridge is made from short straight sections that change direction again and again. Instead of crossing water in one line, it slows movement and lets people experience different views."
      },
      {
        color: "#b04128",
        name: "Railings and edges (栏杆)",
        zh: "栏杆",
        desc: "Railings define the path and make the bridge feel like an architectural space. In classical Chinese gardens, the bridge is part of the scenery, not only a way to get across."
      },
      {
        color: "#7a5a38",
        name: "Bridge supports (桥柱)",
        zh: "桥柱",
        desc: "Like the water houses, the bridge uses vertical supports set into the water below. This means both the homes and the bridge follow the same idea of raised construction over water."
      }
    ]
  },
  {
    title: "Stage 6 — Full Water Town Construction Idea",
    zh: "整体水乡构造 Zhěngtǐ Shuǐxiāng Gòuzào",
    show: ["g-piles", "g-platforms", "g-houses", "g-bridge", "g-labels"],
    hide: [],
    layers: [
      {
        color: "#1a4a5a",
        name: "Building above water (水上建造)",
        zh: "水上建造",
        desc: "Chinese builders often created life above the water by using piles, platforms, and linked paths. This allowed settlement in wet landscapes without needing to remove the water."
      },
      {
        color: "#9a6b3d",
        name: "Connection of house and bridge (房屋与桥连接)",
        zh: "房屋与桥连接",
        desc: "The houses and zigzag bridge work together as one system. The bridge connects movement, while the houses create places to live, rest, and look out over the water."
      },
      {
        color: "#4e3a2d",
        name: "Chinese water-town design (中国水乡)",
        zh: "中国水乡",
        desc: "This kind of building expresses the beauty of Chinese water towns: architecture raised above the surface, narrow crossings, reflection in the water, and a close relationship between daily life and landscape."
      }
    ]
  }
];

function show(i) {
  const s = stages[i];
  document.querySelectorAll('.stage-btn').forEach((b, j) => b.classList.toggle('active', j === i));

  const allIds = ["g-piles", "g-platforms", "g-houses", "g-bridge", "g-labels"];
  allIds.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (s.hide.includes(id)) el.style.opacity = "0";
    else if (s.show.includes(id)) el.style.opacity = "1";
  });

  let html = `<div class="stage-title">${s.title} <span class="zh">${s.zh}</span></div>`;
  s.layers.forEach(l => {
    html += `
      <div class="layer-row">
        <div class="layer-dot" style="background:${l.color}"></div>
        <div class="layer-name">${l.name}<span class="zh">${l.zh}</span></div>
        <div class="layer-desc">${l.desc}</div>
      </div>
    `;
  });

  document.getElementById("detail-content").innerHTML = html;
}

show(0);
</script>
</body>
</html>
